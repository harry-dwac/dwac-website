name: Build and Deploy

on:
  push:
    branches: [main, Harry-dwac]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./out
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Deploy to Cloudflare Pages
        if: vars.CF_DEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: dwac-website
          directory: out

      - name: Trigger Vercel Production Deploy
        run: curl -s -X POST 'https://api.vercel.com/v1/integrations/deploy/prj_6axfYJdlMvIxFxFQv2kxOw5ZG3SB/Xi6KLomcvH'
