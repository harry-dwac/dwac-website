<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="50%" style="stop-color:#f0d68a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="8"/>
  
  <!-- Grid Pattern -->
  <g stroke="#c9a84c" stroke-width="0.5" opacity="0.1">
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="96" y1="96" x2="416" y2="416"/>
    <line x1="416" y1="96" x2="96" y2="416"/>
  </g>
  
  <!-- D Letter -->
  <text x="256" y="340" font-family="Georgia, serif" font-size="280" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle">D</text>
  
  <!-- Decorative Arc -->
  <path d="M 128 256 A 128 128 0 0 1 384 256" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.6"/>
  <path d="M 148 256 A 108 108 0 0 1 364 256" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.4"/>
  
  <!-- Corner Decorations -->
  <circle cx="128" cy="128" r="8" fill="#c9a84c" opacity="0.8"/>
  <circle cx="384" cy="128" r="8" fill="#c9a84c" opacity="0.8"/>
  <circle cx="128" cy="384" r="8" fill="#c9a84c" opacity="0.8"/>
  <circle cx="384" cy="384" r="8" fill="#c9a84c" opacity="0.8"/>
</svg>
